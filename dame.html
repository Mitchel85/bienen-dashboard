<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dame (Checkers) gegen Clawdia 🦞</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #f1c40f;
        }
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .info-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            min-width: 180px;
        }
        .info-box h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #3498db;
        }
        .info-box p {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .board-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-gap: 0;
            border: 4px solid #444;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
        }
        .cell {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }
        .cell.dark {
            background-color: #8b4513;
        }
        .cell.light {
            background-color: #f5deb3;
        }
        .piece {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s;
        }
        .piece.player {
            background: radial-gradient(circle at 30% 30%, #e74c3c, #c0392b);
            border: 2px solid #922b21;
        }
        .piece.ai {
            background: radial-gradient(circle at 30% 30%, #2c3e50, #1a252f);
            border: 2px solid #0e1419;
        }
        .piece.king::after {
            content: "♔";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: gold;
            text-shadow: 0 0 5px black;
        }
        .cell.selected .piece {
            transform: scale(1.1);
            box-shadow: 0 0 15px gold;
        }
        .cell.valid-move {
            background-color: rgba(46, 204, 113, 0.5) !important;
        }
        .cell.valid-capture {
            background-color: rgba(231, 76, 60, 0.5) !important;
        }
        .status {
            font-size: 1.5rem;
            margin: 20px 0;
            min-height: 2rem;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        button#reset {
            background: #e74c3c;
            color: white;
        }
        button#reset:hover {
            background: #c0392b;
            transform: translateY(-3px);
        }
        button#help {
            background: #3498db;
            color: white;
        }
        button#help:hover {
            background: #2980b9;
        }
        button#hint {
            background: #2ecc71;
            color: white;
        }
        button#hint:hover {
            background: #27ae60;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        @media (max-width: 600px) {
            .cell {
                width: 40px;
                height: 40px;
            }
            .piece {
                width: 35px;
                height: 35px;
            }
            h1 {
                font-size: 2rem;
            }
        }
        .piece.player.king {
            background: radial-gradient(circle at 30% 30%, #f39c12, #e67e22);
        }
        .piece.ai.king {
            background: radial-gradient(circle at 30% 30%, #7f8c8d, #34495e);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦞 Dame (Checkers) gegen Clawdia</h1>
        <p class="subtitle">Du spielst rot, Clawdia spielt schwarz. Normale Dame‑Regeln (8×8).</p>
        
        <div class="game-info">
            <div class="info-box">
                <h3>Deine Steine</h3>
                <p id="player-count">12</p>
            </div>
            <div class="info-box">
                <h3>Clawdias Steine</h3>
                <p id="ai-count">12</p>
            </div>
            <div class="info-box">
                <h3>Zug</h3>
                <p id="turn">Rot (du)</p>
            </div>
        </div>
        
        <div class="board-container">
            <div class="board" id="board">
                <!-- 8x8 Zellen werden per JS generiert -->
            </div>
        </div>
        
        <div class="status" id="status">Wähle einen deiner Steine.</div>
        
        <div class="controls">
            <button id="reset">🔄 Neues Spiel</button>
            <button id="hint">💡 Tipp anzeigen</button>
            <button id="help">❓ Regeln</button>
        </div>
        
        <div class="footer">
            <p>Öffne diese Datei in deinem Browser – alles lokal, kein Server.</p>
            <p>Erstellt mit ❤️ von Clawdia</p>
        </div>
    </div>

    <script>
        // Spielzustand
        let board = Array(8).fill().map(() => Array(8).fill(null));
        let currentPlayer = 'player'; // 'player' oder 'ai'
        let selectedPiece = null; // {row, col}
        let validMoves = []; // {row, col, isCapture}
        let gameActive = true;
        let playerPieces = 12;
        let aiPieces = 12;

        // DOM-Elemente
        const boardElement = document.getElementById('board');
        const statusDisplay = document.getElementById('status');
        const playerCountDisplay = document.getElementById('player-count');
        const aiCountDisplay = document.getElementById('ai-count');
        const turnDisplay = document.getElementById('turn');

        // Initialisierung
        function initGame() {
            // Brett leeren
            board = Array(8).fill().map(() => Array(8).fill(null));
            
            // Spieler (rot) oben, KI (schwarz) unten
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) { // Nur dunkle Felder
                        if (row < 3) {
                            board[row][col] = { type: 'player', king: false };
                        } else if (row > 4) {
                            board[row][col] = { type: 'ai', king: false };
                        }
                    }
                }
            }
            
            playerPieces = 12;
            aiPieces = 12;
            currentPlayer = 'player';
            selectedPiece = null;
            validMoves = [];
            gameActive = true;
            
            updateDisplays();
            renderBoard();
        }

        // Brett rendern
        function renderBoard() {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    // Gültige Züge markieren
                    const move = validMoves.find(m => m.row === row && m.col === col);
                    if (move) {
                        cell.classList.add(move.isCapture ? 'valid-capture' : 'valid-move');
                    }
                    
                    // Ausgewählter Stein
                    if (selectedPiece && selectedPiece.row === row && selectedPiece.col === col) {
                        cell.classList.add('selected');
                    }
                    
                    // Stein zeichnen
                    const piece = board[row][col];
                    if (piece) {
                        const pieceDiv = document.createElement('div');
                        pieceDiv.className = `piece ${piece.type} ${piece.king ? 'king' : ''}`;
                        cell.appendChild(pieceDiv);
                    }
                    
                    cell.addEventListener('click', () => handleCellClick(row, col));
                    boardElement.appendChild(cell);
                }
            }
        }

        // Zellenklick
        function handleCellClick(row, col) {
            if (!gameActive) return;
            
            const piece = board[row][col];
            
            // Ein Stein des aktuellen Spielers auswählen
            if (currentPlayer === 'player' && piece && piece.type === 'player') {
                selectedPiece = { row, col };
                calculateValidMoves(row, col, piece);
                renderBoard();
                statusDisplay.textContent = 'Wähle ein Ziel für deinen Zug.';
                return;
            }
            
            // Auf ein gültiges Feld klicken
            const move = validMoves.find(m => m.row === row && m.col === col);
            if (selectedPiece && move) {
                makeMove(selectedPiece.row, selectedPiece.col, row, col, move.isCapture);
                return;
            }
            
            // Ungültige Auswahl
            selectedPiece = null;
            validMoves = [];
            renderBoard();
            statusDisplay.textContent = 'Ungültiger Zug. Wähle einen deiner Steine.';
        }

        // Gültige Züge berechnen
        function calculateValidMoves(row, col, piece) {
            validMoves = [];
            const direction = piece.king ? [ -1, 1 ] : (piece.type === 'player' ? [1] : [-1]);
            const captures = [];
            
            for (const dirRow of direction) {
                for (const dirCol of [-1, 1]) {
                    const newRow = row + dirRow;
                    const newCol = col + dirCol;
                    
                    // Normale Bewegung
                    if (isInBoard(newRow, newCol) && board[newRow][newCol] === null) {
                        validMoves.push({ row: newRow, col: newCol, isCapture: false });
                    }
                    
                    // Schlagen
                    const jumpRow = row + 2 * dirRow;
                    const jumpCol = col + 2 * dirCol;
                    if (isInBoard(jumpRow, jumpCol) && board[jumpRow][jumpCol] === null) {
                        const midRow = row + dirRow;
                        const midCol = col + dirCol;
                        const midPiece = board[midRow][midCol];
                        if (midPiece && midPiece.type !== piece.type) {
                            captures.push({ row: jumpRow, col: jumpCol, isCapture: true });
                        }
                    }
                }
            }
            
            // Schlagen hat Vorrang
            if (captures.length > 0) {
                validMoves = captures;
            }
        }

        // Zug ausführen
        function makeMove(fromRow, fromCol, toRow, toCol, isCapture) {
            const piece = board[fromRow][fromCol];
            board[toRow][toCol] = piece;
            board[fromRow][fromCol] = null;
            
            // In Dame umwandeln
            if ((piece.type === 'player' && toRow === 7) || (piece.type === 'ai' && toRow === 0)) {
                piece.king = true;
            }
            
            // Geschlagenen Stein entfernen
            if (isCapture) {
                const midRow = (fromRow + toRow) / 2;
                const midCol = (fromCol + toCol) / 2;
                board[midRow][midCol] = null;
                
                if (piece.type === 'player') {
                    aiPieces--;
                } else {
                    playerPieces--;
                }
            }
            
            // Spielende prüfen
            if (playerPieces === 0 || aiPieces === 0) {
                gameActive = false;
                statusDisplay.textContent = playerPieces === 0 ? '🤖 Clawdia gewinnt!' : '🎉 Du gewinnst!';
                updateDisplays();
                renderBoard();
                return;
            }
            
            // Wechseln
            currentPlayer = currentPlayer === 'player' ? 'ai' : 'player';
            selectedPiece = null;
            validMoves = [];
            
            updateDisplays();
            renderBoard();
            
            if (gameActive && currentPlayer === 'ai') {
                statusDisplay.textContent = 'Clawdia denkt nach...';
                setTimeout(makeAIMove, 800);
            } else {
                statusDisplay.textContent = 'Dein Zug. Wähle einen Stein.';
            }
        }

        // KI‑Zug (einfache Logik)
        function makeAIMove() {
            if (!gameActive) return;
            
            // Sammle alle möglichen Züge
            let allMoves = [];
            let captureMoves = [];
            
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const piece = board[row][col];
                    if (piece && piece.type === 'ai') {
                        calculateValidMoves(row, col, piece);
                        validMoves.forEach(move => {
                            const moveObj = {
                                from: { row, col },
                                to: { row: move.row, col: move.col },
                                isCapture: move.isCapture,
                                piece: piece
                            };
                            allMoves.push(moveObj);
                            if (move.isCapture) captureMoves.push(moveObj);
                        });
                    }
                }
            }
            
            // Schlagen bevorzugen
            const moves = captureMoves.length > 0 ? captureMoves : allMoves;
            if (moves.length === 0) {
                // Kein Zug möglich → Spieler gewinnt
                gameActive = false;
                statusDisplay.textContent = '🎉 Du gewinnst (KI steckfest)!';
                updateDisplays();
                return;
            }
            
            // Zufälligen Zug auswählen
            const move = moves[Math.floor(Math.random() * moves.length)];
            makeMove(move.from.row, move.from.col, move.to.row, move.to.col, move.isCapture);
        }

        // Hilfsfunktionen
        function isInBoard(row, col) {
            return row >= 0 && row < 8 && col >= 0 && col < 8;
        }

        function updateDisplays() {
            playerCountDisplay.textContent = playerPieces;
            aiCountDisplay.textContent = aiPieces;
            turnDisplay.textContent = currentPlayer === 'player' ? 'Rot (du)' : 'Schwarz (Clawdia)';
        }

        // Tipp anzeigen
        function showHint() {
            if (currentPlayer !== 'player' || !gameActive) return;
            
            // Finde einen möglichen Zug
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const piece = board[row][col];
                    if (piece && piece.type === 'player') {
                        calculateValidMoves(row, col, piece);
                        if (validMoves.length > 0) {
                            statusDisplay.textContent = `Tipp: Bewege Stein von (${row+1}, ${col+1}).`;
                            selectedPiece = { row, col };
                            renderBoard();
                            return;
                        }
                    }
                }
            }
            statusDisplay.textContent = 'Kein Zug möglich.';
        }

        // Regeln anzeigen
        function showRules() {
            alert('🎯 Dame‑Regeln (8×8):\n\n' +
                  '• Ziel: Alle gegnerischen Steine schlagen oder blockieren.\n' +
                  '• Normale Steine bewegen sich diagonal vorwärts (rot: abwärts, schwarz: aufwärts).\n' +
                  '• Schlagen durch Überspringen (diagonal). Mehrfachschläge möglich.\n' +
                  '• Wenn ein Stein die gegnerische Grundreihe erreicht, wird er zum König (♔).\n' +
                  '• Könige bewegen sich diagonal vorwärts und rückwärts.\n' +
                  '• Schlagen ist Pflicht, wenn möglich.\n\n' +
                  'Du spielst rot (unten). Viel Spaß! 🦞');
        }

        // Event‑Listener
        document.getElementById('reset').addEventListener('click', initGame);
        document.getElementById('hint').addEventListener('click', showHint);
        document.getElementById('help').addEventListener('click', showRules);

        // Start
        initGame();
    </script>
</body>
</html>
