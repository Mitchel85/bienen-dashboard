<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic‑Tac‑Toe mit Clawdia 🦞</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #2c3e50, #4a6491);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #f1c40f;
        }
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            margin: 30px auto;
            max-width: 300px;
        }
        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        .cell:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }
        .cell.x {
            color: #e74c3c;
        }
        .cell.o {
            color: #3498db;
        }
        .status {
            font-size: 1.5rem;
            margin: 20px 0;
            min-height: 2rem;
        }
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        button#reset {
            background: #e74c3c;
            color: white;
        }
        button#reset:hover {
            background: #c0392b;
            transform: translateY(-3px);
        }
        button#help {
            background: #2ecc71;
            color: white;
        }
        button#help:hover {
            background: #27ae60;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .ai-move {
            animation: pulse 0.5s;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦞 Tic‑Tac‑Toe</h1>
        <p class="subtitle">Spiele gegen Clawdia – du bist X, sie ist O.</p>
        
        <div class="status" id="status">Dein Zug – klicke ein Feld.</div>
        
        <div class="board" id="board">
            <!-- Zellen werden per JS generiert -->
        </div>
        
        <div class="controls">
            <button id="reset">🔁 Neues Spiel</button>
            <button id="help">❓ Spielregeln</button>
        </div>
        
        <div class="footer">
            <p>Öffne diese Datei in deinem Browser – alles lokal, kein Server.</p>
            <p>Erstellt mit ❤️ von Clawdia</p>
        </div>
    </div>

    <script>
        // Spielzustand
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X'; // Mensch = X, AI = O
        let gameActive = true;
        const statusDisplay = document.getElementById('status');
        const boardElement = document.getElementById('board');

        // Gewinnkombinationen
        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Reihen
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Spalten
            [0, 4, 8], [2, 4, 6]             // Diagonalen
        ];

        // Board initialisieren
        function initBoard() {
            boardElement.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                boardElement.appendChild(cell);
            }
            updateBoard();
        }

        // Board anzeigen
        function updateBoard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, index) => {
                cell.textContent = board[index];
                if (board[index] === 'X') cell.classList.add('x');
                else if (board[index] === 'O') cell.classList.add('o');
                else {
                    cell.classList.remove('x', 'o');
                }
            });
        }

        // Zellenklick
        function handleCellClick(index) {
            if (!gameActive || board[index] !== '') return;
            if (currentPlayer !== 'X') return; // Nur Mensch darf klicken
            
            board[index] = 'X';
            updateBoard();
            checkResult();
            if (gameActive) {
                currentPlayer = 'O';
                statusDisplay.textContent = 'Clawdia denkt nach...';
                setTimeout(makeAIMove, 500);
            }
        }

        // KI‑Zug (einfache Logik)
        function makeAIMove() {
            if (!gameActive) return;
            
            // 1. Versuche zu gewinnen
            let move = findWinningMove('O');
            // 2. Blockiere Mensch
            if (move === -1) move = findWinningMove('X');
            // 3. Nimm Mitte, falls frei
            if (move === -1 && board[4] === '') move = 4;
            // 4. Zufälliges freies Feld
            if (move === -1) {
                const empty = board.map((val, idx) => val === '' ? idx : -1).filter(idx => idx !== -1);
                move = empty[Math.floor(Math.random() * empty.length)];
            }
            
            board[move] = 'O';
            const cell = document.querySelector(`.cell[data-index="${move}"]`);
            cell.classList.add('ai-move');
            setTimeout(() => cell.classList.remove('ai-move'), 500);
            updateBoard();
            checkResult();
            if (gameActive) {
                currentPlayer = 'X';
                statusDisplay.textContent = 'Dein Zug – klicke ein Feld.';
            }
        }

        // Suche Gewinnzug für Spieler
        function findWinningMove(player) {
            for (const pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (board[a] === player && board[b] === player && board[c] === '') return c;
                if (board[a] === player && board[c] === player && board[b] === '') return b;
                if (board[b] === player && board[c] === player && board[a] === '') return a;
            }
            return -1;
        }

        // Ergebnis prüfen
        function checkResult() {
            let winner = null;
            
            for (const pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    winner = board[a];
                    break;
                }
            }
            
            if (winner) {
                gameActive = false;
                statusDisplay.textContent = winner === 'X' ? '🎉 Du hast gewonnen!' : '🤖 Clawdia gewinnt!';
                highlightWinningCells();
                return;
            }
            
            if (!board.includes('')) {
                gameActive = false;
                statusDisplay.textContent = '🤝 Unentschieden!';
                return;
            }
        }

        // Gewinnfelder hervorheben
        function highlightWinningCells() {
            for (const pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    pattern.forEach(idx => {
                        document.querySelector(`.cell[data-index="${idx}"]`).style.background = 'rgba(241, 196, 15, 0.5)';
                    });
                    break;
                }
            }
        }

        // Spiel zurücksetzen
        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            statusDisplay.textContent = 'Dein Zug – klicke ein Feld.';
            initBoard();
        }

        // Spielregeln anzeigen
        function showHelp() {
            alert('🎯 Tic‑Tac‑Toe Regeln:\n\n' +
                  '• Ziel: Drei eigene Symbole in einer Reihe (horizontal, vertikal oder diagonal) setzen.\n' +
                  '• Du bist X, Clawdia ist O.\n' +
                  '• Klicke auf ein leeres Feld, um dein X zu setzen.\n' +
                  '• Clawdia antwortet automatisch.\n' +
                  '• Bei Unentschieden starte ein neues Spiel.\n\n' +
                  'Viel Spaß! 🦞');
        }

        // Event‑Listener
        document.getElementById('reset').addEventListener('click', resetGame);
        document.getElementById('help').addEventListener('click', showHelp);

        // Start
        initBoard();
    </script>
</body>
</html>
